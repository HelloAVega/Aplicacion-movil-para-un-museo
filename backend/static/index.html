<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Museo Interactivo</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Copia del frontend para servir desde Django -->

  <div id="screen-welcome" class="screen active">
    <div class="welcome-container">
      <h1 class="welcome-title">¡Bienvenido!</h1>
      <p class="welcome-subtitle">Regístrate para entrar al museo</p>

      <div class="form-group">
        <label class="form-label">¿Cómo te llamas?</label>
        <input id="inp-name" class="form-input" type="text" placeholder="Escribe aquí tu nombre" />
      </div>

      <div class="form-group">
        <label class="form-label">¿Cuántos años tienes?</label>
        <input id="inp-age" class="form-input" type="number" placeholder="Escribe aquí tu edad" min="1" max="120" />
      </div>

      <div class="form-group">
        <label class="form-label">¿Curso?</label>
        <input id="inp-course" class="form-input" type="text" placeholder="Escribe aquí tu curso" />
        <span class="form-hint">Solo si vienes en grupo</span>
      </div>

      <button id="btn-enter" class="btn-primary">Entrar</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
